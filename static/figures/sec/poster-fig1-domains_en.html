<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highlight 1: 6 Domains, 60 Tasks, Red+Blue Dual Stack</title>
<style>
:root {
  --bg: #ffffff;
  --fg: #1f2328;
  --line: #d1d9e0;
  --muted: #59636e;
  --red-light: #FFF3E0;
  --red-mid: #FF9800;
  --red-deep: #E65100;
  --red-dark: #BF360C;
  --blue-light: #E3F2FD;
  --blue-mid: #42A5F5;
  --blue-deep: #1565C0;
  --blue-dark: #0D47A1;
  --purple-light: #F3E5F5;
  --purple-mid: #AB47BC;
  --purple-deep: #6A1B9A;
}
html, body {
  margin: 0; padding: 0; box-sizing: border-box;
  width: 100%; overflow: hidden;
  background: #ffffff;
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft Yahei', system-ui, sans-serif;
}
svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#90A4AE"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="70" text-anchor="middle" font-size="40" font-weight="900" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">6 Domains, 60 Tasks, Red+Blue Dual Stack</text>
  <text x="800" y="105" text-anchor="middle" font-size="18" fill="#59636e" font-family="'Noto Sans SC',sans-serif">One suite, covering both the attack side and the defense side</text>

  <!-- Center label badges: RED TEAM / BLUE TEAM -->
  <rect x="160" y="155" width="220" height="40" rx="20" fill="#FF9800" stroke="#E65100" stroke-width="0"/>
  <text x="270" y="181" text-anchor="middle" font-size="18" font-weight="700" fill="#fff" font-family="'Noto Sans SC',sans-serif">RED TEAM · Attack</text>

  <rect x="1220" y="155" width="220" height="40" rx="20" fill="#1565C0" stroke="#0D47A1" stroke-width="0"/>
  <text x="1330" y="181" text-anchor="middle" font-size="18" font-weight="700" fill="#fff" font-family="'Noto Sans SC',sans-serif">BLUE TEAM · Defense</text>

  <!-- Root node -->
  <rect x="640" y="140" width="320" height="72" rx="10" fill="#37474F" stroke="#263238" stroke-width="0"/>
  <foreignObject x="640" y="140" width="320" height="72">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:700 22px/1.2 'Noto Sans SC',sans-serif;color:#fff;text-align:center;">
      <span style="font-size:19px;">WorkBuddy Bench Security</span>
      <span style="font-size:14px;font-weight:400;opacity:0.8;">60 tasks · 6 domains</span>
    </div>
  </foreignObject>

  <!-- Fan-out lines to 6 nodes -->
  <path d="M 640 212 Q 400 280 200 310" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <path d="M 640 212 Q 480 280 440 310" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <path d="M 640 212 Q 620 280 680 310" fill="none" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
  <path d="M 960 212 Q 980 280 920 310" fill="none" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
  <path d="M 960 212 Q 1120 280 1160 310" fill="none" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
  <path d="M 960 212 Q 1200 280 1400 310" fill="none" stroke="#AB47BC" stroke-width="2" opacity="0.5"/>

  <!-- Row: 6 domain cards -->

  <!-- Card 1: Whitebox (red) -->
  <rect x="80" y="310" width="240" height="130" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <foreignObject x="80" y="310" width="240" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:20px;font-weight:800;color:#BF360C;">Whitebox source audit</span>
      <span style="font-size:12px;color:#8d6e63;margin-top:8px;">Real CVEs · find-vuln + PoC</span>
    </div>
  </foreignObject>

  <!-- Card 2: Blackbox (red) -->
  <rect x="360" y="310" width="240" height="130" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <foreignObject x="360" y="310" width="240" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:20px;font-weight:800;color:#BF360C;">Blackbox binary exploitation</span>
      <span style="font-size:12px;color:#8d6e63;margin-top:8px;">Closed-source ELF · network services</span>
    </div>
  </foreignObject>

  <!-- Card 3: Vuln-exploit (red) -->
  <rect x="640" y="310" width="240" height="130" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <foreignObject x="640" y="310" width="240" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:20px;font-weight:800;color:#BF360C;">Web exploitation</span>
      <span style="font-size:12px;color:#8d6e63;margin-top:8px;">SSRF · JWT · deserialization</span>
    </div>
  </foreignObject>

  <!-- Card 4: Malware (blue) -->
  <rect x="920" y="310" width="240" height="130" rx="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2.5"/>
  <foreignObject x="920" y="310" width="240" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:32px;font-weight:900;color:#0D47A1;">14</span>
      <span style="font-size:15px;font-weight:600;color:#1565C0;margin-top:4px;">Malware analysis</span>
      <span style="font-size:12px;color:#5c6f7a;margin-top:2px;">PE/Go/.NET reversing + YARA</span>
    </div>
  </foreignObject>

  <!-- Card 5: SecOps (blue) -->
  <rect x="1200" y="310" width="240" height="130" rx="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2.5"/>
  <foreignObject x="1200" y="310" width="240" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:32px;font-weight:900;color:#0D47A1;">8</span>
      <span style="font-size:15px;font-weight:600;color:#1565C0;margin-top:4px;">Security operations &amp; detection</span>
      <span style="font-size:12px;color:#5c6f7a;margin-top:2px;">SOC triage · detection-rule authoring</span>
    </div>
  </foreignObject>

  <!-- Card 6: Agent Sec (purple, spans full width center) -->
  <rect x="600" y="560" width="400" height="130" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="600" y="560" width="400" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:12px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:14px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:32px;font-weight:900;color:#4A148C;">6</span>
      <span style="font-size:15px;font-weight:600;color:#6A1B9A;margin-top:4px;">AI agent security</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Injection · chain hijacking · tool confusion</span>
    </div>
  </foreignObject>

  <!-- Vertical arrows from row 1 to Agent card -->
  <path d="M 200 440 L 200 500 L 700 500 L 700 560" fill="none" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
  <path d="M 1400 440 L 1400 500 L 900 500 L 900 560" fill="none" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Difficulty bar at bottom -->
  <rect x="80" y="740" width="1440" height="120" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="100" y="770" font-size="14" font-weight="600" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">Difficulty distribution: hard tasks dominate, matching real security work</text>

  <!-- mini bar chart -->
  <rect x="100" y="790" width="220" height="22" rx="3" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="100" y="790" width="55" height="22" rx="3" fill="#90A4AE"/>
  <text x="330" y="806" font-size="13" fill="#59636e" font-family="'Noto Sans SC',sans-serif">easy</text>

  <rect x="490" y="790" width="220" height="22" rx="3" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="1"/>
  <rect x="490" y="790" width="34" height="22" rx="3" fill="#78909C"/>
  <text x="720" y="806" font-size="13" fill="#59636e" font-family="'Noto Sans SC',sans-serif">medium</text>

  <rect x="880" y="790" width="220" height="22" rx="3" fill="#FFE0B2" stroke="#FFB74D" stroke-width="1"/>
  <rect x="880" y="790" width="127" height="22" rx="3" fill="#FF9800"/>
  <text x="1110" y="806" font-size="13" fill="#E65100" font-weight="600" font-family="'Noto Sans SC',sans-serif">hard</text>

  <rect x="1200" y="790" width="220" height="22" rx="3" fill="#FFCCBC" stroke="#FF7043" stroke-width="1"/>
  <rect x="1200" y="790" width="10" height="22" rx="3" fill="#E65100"/>
  <text x="1430" y="806" font-size="13" fill="#E65100" font-weight="600" font-family="'Noto Sans SC',sans-serif">expert</text>
</svg>
</body>
</html>
