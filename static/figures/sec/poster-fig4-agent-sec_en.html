<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highlight 4: Agent-Security Frontier</title>
<style>
html, body {
  margin: 0; padding: 0; box-sizing: border-box;
  width: 100%; overflow: hidden;
  background: #ffffff;
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft Yahei', system-ui, sans-serif;
}
svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#AB47BC"/>
    </marker>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E1BEE7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E1BEE7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Title -->
  <text x="800" y="60" text-anchor="middle" font-size="40" font-weight="900" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">Agent-Security Frontier</text>
  <text x="800" y="95" text-anchor="middle" font-size="18" fill="#59636e" font-family="'Noto Sans SC',sans-serif">6 attack vectors, assessing the attack surface once an AI agent holds tool-calling permissions</text>

  <!-- Center glow -->
  <circle cx="800" cy="440" r="280" fill="url(#centerGlow)"/>

  <!-- Center: Agent node -->
  <circle cx="800" cy="440" r="90" fill="#6A1B9A" stroke="#4A148C" stroke-width="3"/>
  <foreignObject x="690" y="370" width="220" height="140">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:700 22px/1.3 'Noto Sans SC',sans-serif;color:#fff;text-align:center;word-wrap:break-word;">
      AI Agent
      <span style="font-size:13px;font-weight:400;opacity:0.8;">Tool-calling permissions</span>
    </div>
  </foreignObject>

  <!-- 6 attack vectors radiating outward -->

  <!-- Vector 1: A2A Injection (top-left) -->
  <path d="M 730 390 L 500 280" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="160" y="200" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="160" y="200" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">Agent-to-agent (A2A) injection</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Agent-A's output is executed by Agent-B as a trusted instruction</span>
    </div>
  </foreignObject>

  <!-- Vector 2: Thought Hijack (top-right) -->
  <path d="M 870 390 L 1100 280" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="1080" y="200" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="1080" y="200" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">ReAct chain hijacking</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Injecting fake Observations to poison the scratchpad</span>
    </div>
  </foreignObject>

  <!-- Vector 3: Multimodal Chain (right) -->
  <path d="M 890 440 L 1140 440" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="1150" y="390" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="1150" y="390" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">Multimodal prompt-chain injection</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">OCR · audio transcription · cross-modal injection via web content</span>
    </div>
  </foreignObject>

  <!-- Vector 4: Schema Confusion (bottom-right) -->
  <path d="M 870 490 L 1100 600" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="1080" y="580" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="1080" y="580" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">Tool-schema confusion</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Bypassing additionalProperties / oneOf constraints</span>
    </div>
  </foreignObject>

  <!-- Vector 5: Summarize Exfil (bottom-left) -->
  <path d="M 730 490 L 500 600" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="160" y="580" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="160" y="580" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">Summarize-tool exfiltration</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Using a legitimate summarize tool as a data-exfiltration channel</span>
    </div>
  </foreignObject>

  <!-- Vector 6: Time-Delayed Trigger (left) -->
  <path d="M 710 440 L 460 440" fill="none" stroke="#AB47BC" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="90" y="390" width="360" height="95" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="90" y="390" width="360" height="95">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.3 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-weight:700;font-size:17px;color:#4A148C;">Delayed trigger</span>
      <span style="font-size:12px;color:#7b6777;margin-top:2px;">Injected instructions embedded in a document, triggered by a future date</span>
    </div>
  </foreignObject>

  <!-- Bottom: evaluation output -->
  <rect x="300" y="720" width="1000" height="60" rx="10" fill="#37474F" stroke="#263238" stroke-width="0"/>
  <foreignObject x="300" y="720" width="1000" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:8px 16px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;font:16px/1.3 'Noto Sans SC',sans-serif;color:#fff;text-align:center;">
      <span style="font-weight:600;">Evaluation output:</span>
      <span style="margin-left:8px;font-size:14px;opacity:0.9;">resisted injection? · detected tool misuse? · caught data leak? · attack-chain description · CVSS severity score</span>
    </div>
  </foreignObject>

  <text x="800" y="815" text-anchor="middle" font-size="13" fill="#59636e" font-family="'Noto Sans SC',sans-serif">Mirrors the security-assessment work an AI-safety team does before an agent ships</text>
</svg>
</body>
</html>
