<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highlight 5: Five-Layer Anti-Cheat Infrastructure</title>
<style>
html, body {
  margin: 0; padding: 0; box-sizing: border-box;
  width: 100%; overflow: hidden;
  background: #ffffff;
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft Yahei', system-ui, sans-serif;
}
svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 1600 900" width="1600" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#59636e"/>
    </marker>
    <marker id="arr-block" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#E53935"/>
    </marker>
    <marker id="arr-pass" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="60" text-anchor="middle" font-size="40" font-weight="900" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">Five-Layer Anti-Cheat Infrastructure</text>
  <text x="800" y="95" text-anchor="middle" font-size="18" fill="#59636e" font-family="'Noto Sans SC',sans-serif">Closing off cheating paths across input, code and output so scores reflect real analysis ability</text>

  <!-- Three dimension labels -->
  <text x="280" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#1565C0" font-family="'Noto Sans SC',sans-serif">Input dimension</text>
  <text x="800" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100" font-family="'Noto Sans SC',sans-serif">Code dimension</text>
  <text x="1320" y="155" text-anchor="middle" font-size="16" font-weight="700" fill="#6A1B9A" font-family="'Noto Sans SC',sans-serif">Output dimension</text>

  <!-- 5 layer cards in a horizontal flow -->

  <!-- Layer 1: Forbidden Literals (code) -->
  <rect x="80" y="180" width="280" height="160" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="2.5"/>
  <foreignObject x="80" y="180" width="280" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.4 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:28px;font-weight:900;color:#BF360C;">&#9312;</span>
      <span style="font-weight:700;font-size:16px;color:#E65100;margin-top:4px;">Banned-literal scan</span>
      <span style="font-size:12px;color:#8d6e63;margin-top:6px;">Scans extractor source; a hit on a sample-specific value zeroes the robustness sub-score</span>
    </div>
  </foreignObject>

  <!-- Layer 2: Renamed Input (input) -->
  <rect x="400" y="180" width="280" height="160" rx="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2.5"/>
  <foreignObject x="400" y="180" width="280" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.4 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:28px;font-weight:900;color:#0D47A1;">&#9313;</span>
      <span style="font-weight:700;font-size:16px;color:#1565C0;margin-top:4px;">Renamed-input test</span>
      <span style="font-size:12px;color:#5c6f7a;margin-top:6px;">Reruns the extractor on a renamed sample to confirm it parses structure, not the filename</span>
    </div>
  </foreignObject>

  <!-- Layer 3: Overlay Input (input) -->
  <rect x="720" y="180" width="280" height="160" rx="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2.5"/>
  <foreignObject x="720" y="180" width="280" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.4 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:28px;font-weight:900;color:#0D47A1;">&#9314;</span>
      <span style="font-weight:700;font-size:16px;color:#1565C0;margin-top:4px;">Overlay / tamper test</span>
      <span style="font-size:12px;color:#5c6f7a;margin-top:6px;">Appends data to the sample's trailer and checks output is unchanged &mdash; immune to trailer tampering</span>
    </div>
  </foreignObject>

  <!-- Layer 4: Encoded Dependency (output) -->
  <rect x="1040" y="180" width="280" height="160" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="1040" y="180" width="280" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:14px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.4 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:28px;font-weight:900;color:#4A148C;">&#9315;</span>
      <span style="font-weight:700;font-size:16px;color:#6A1B9A;margin-top:4px;">Encoding-dependence test</span>
      <span style="font-size:12px;color:#7b6777;margin-top:6px;">Zeroes the encoded bytes and confirms the rule no longer matches &mdash; anchored to encoding, not plaintext</span>
    </div>
  </foreignObject>

  <!-- Layer 5: Low-weight Decoy (output) -->
  <rect x="1360" y="180" width="160" height="160" rx="10" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2.5"/>
  <foreignObject x="1360" y="180" width="160" height="160">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:10px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:15px/1.4 'Noto Sans SC',sans-serif;text-align:center;word-wrap:break-word;">
      <span style="font-size:28px;font-weight:900;color:#4A148C;">&#9316;</span>
      <span style="font-weight:700;font-size:15px;color:#6A1B9A;margin-top:4px;">Low-weight decoy fields</span>
      <span style="font-size:11px;color:#7b6777;margin-top:4px;">Easily-brute-forced fields weighted down to ~1.5%, steering toward structured analysis</span>
    </div>
  </foreignObject>

  <!-- Connecting arrows between layers (horizontal flow) -->
  <path d="M 360 260 L 400 260" fill="none" stroke="#90A4AE" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 680 260 L 720 260" fill="none" stroke="#90A4AE" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 1000 260 L 1040 260" fill="none" stroke="#90A4AE" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 1320 260 L 1360 260" fill="none" stroke="#90A4AE" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Center: converging to final reward -->
  <path d="M 220 340 L 220 440 L 800 440" fill="none" stroke="#59636e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 540 340 L 540 440 L 800 440" fill="none" stroke="#59636e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 860 340 L 860 440 L 800 440" fill="none" stroke="#59636e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 1180 340 L 1180 440 L 800 440" fill="none" stroke="#59636e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 1440 340 L 1440 440 L 800 440" fill="none" stroke="#59636e" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Reward box -->
  <rect x="500" y="470" width="620" height="75" rx="10" fill="#1B5E20" stroke="#0D3D11" stroke-width="0"/>
  <foreignObject x="500" y="470" width="620" height="75">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;padding:10px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;font:600 18px/1.3 'Noto Sans SC',sans-serif;color:#fff;text-align:center;">
      reward = w₁×artifact + w₂×correctness + w₃×robustness
      <span style="font-size:13px;font-weight:400;opacity:0.85;">The five layers feed into the robustness component, keeping scores tied to real analysis ability</span>
    </div>
  </foreignObject>

  <!-- Three dimensions callout -->
  <rect x="80" y="590" width="1440" height="250" rx="10" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="100" y="620" font-size="16" font-weight="600" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">Blocked across three dimensions</text>

  <!-- Input dimension -->
  <circle cx="120" cy="655" r="6" fill="#1565C0"/>
  <text x="138" y="660" font-size="15" font-weight="700" fill="#1565C0" font-family="'Noto Sans SC',sans-serif">Input dim.</text>
  <text x="290" y="660" font-size="14" fill="#59636e" font-family="'Noto Sans SC',sans-serif">Renamed input + overlay input: confirms the extractor parses binary structure, not the filename or trailer data</text>

  <!-- Code dimension -->
  <circle cx="120" cy="695" r="6" fill="#E65100"/>
  <text x="138" y="700" font-size="15" font-weight="700" fill="#E65100" font-family="'Noto Sans SC',sans-serif">Code dim.</text>
  <text x="290" y="700" font-size="14" fill="#59636e" font-family="'Noto Sans SC',sans-serif">Banned-literal scan: blocks hard-coded answers &mdash; a hit on a sample-specific value zeroes the robustness sub-score</text>

  <!-- Output dimension -->
  <circle cx="120" cy="735" r="6" fill="#6A1B9A"/>
  <text x="138" y="740" font-size="15" font-weight="700" fill="#6A1B9A" font-family="'Noto Sans SC',sans-serif">Output dim.</text>
  <text x="290" y="740" font-size="14" fill="#59636e" font-family="'Noto Sans SC',sans-serif">Encoding-dependence + low-weight decoys: keeps detection rules anchored to encoded bytes, suppresses brute-force scoring</text>

  <!-- Stats -->
  <line x1="100" y1="765" x2="1500" y2="765" stroke="#e0e0e0" stroke-width="1"/>
  <text x="120" y="795" font-size="14" font-weight="600" fill="#1f2328" font-family="'Noto Sans SC',sans-serif">Coverage</text>
  <text x="215" y="795" font-size="14" fill="#59636e" font-family="'Noto Sans SC',sans-serif">10 tasks implement anti-cheat mechanisms &middot; gate thresholds 0.30&ndash;0.95 &middot; robustness weight 5%&ndash;10%</text>
</svg>
</body>
</html>
